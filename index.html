<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trener Tabletów Hackerskich</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <!-- GŁÓWNY KONTENER TABLETU (OBRACOWY) -->
    <div class="tablet-frame">
        
        <!-- Fizyczne detale tabletu (przyciski, głośniki) -->
        <div class="physical-details">
            <div class="speaker-grille"></div>
            <div class="camera-lens"></div>
            <div class="volume-buttons">
                <div class="vol-up"></div>
                <div class="vol-down"></div>
            </div>
            <div class="power-button"></div>
        </div>

        <!-- EKRAN TABLETU -->
        <div class="tablet-screen">
            
            <!-- PASEK STANU SYSTEMU (GÓRNY) -->
            <div class="os-status-bar">
                <span class="os-connection">📡 Tablet by Popkus</span>
                <span class="os-time" id="os-time">12:34</span>
                <span class="os-battery">88% 🔋</span>
            </div>
             <div class="login-panel" id="login-panel">
                <div class="login-box">
                    <h2>HACKING TRAINING</h2>
                    <p>Autoryzacja użytkownika</p>
                    <input type="text" id="login-input" placeholder="LOGIN (np. admin)" autocomplete="off">
                    <input type="password" id="pass-input" placeholder="HASŁO" autocomplete="off">
                    <button id="login-btn">ZALOGUJ</button>
                    <p id="login-error" class="error-msg"></p>
                </div>
            </div>
            <div class="login-panel" id="change-pass-panel" style="display: none;">
                <div class="login-box">
                    <h2>WYMAGANA ZMIANA HASŁA</h2>
                    <p>Zabezpiecz swoje nowe konto</p>
                    <input type="password" id="new-pass-input" placeholder="NOWE HASŁO" autocomplete="off">
                    <input type="password" id="new-pass-confirm" placeholder="POWTÓRZ HASŁO" autocomplete="off">
                    <button id="save-pass-btn">ZAPISZ HASŁO</button>
                    <p id="change-pass-error" class="error-msg"></p>
                </div>
            </div>

            <div class="admin-panel" id="admin-panel" style="display: none;">
                <div class="app-header">
                    <h1>&gt; FIB::USER_MANAGEMENT</h1>
                    <div class="app-controls">
                        <span class="control-btn close" id="close-admin-btn">X</span>
                    </div>
                </div>
                <div class="admin-content">
                    <div class="add-user-form">
                        <h3>DODAJ AGENTA</h3>
                        <input type="text" id="add-login" placeholder="Login nowego gracza">
                        <input type="text" id="add-pass" placeholder="Hasło tymczasowe">
                        <button id="create-user-btn">UTWÓRZ KONTO</button>
                    </div>
                    <div class="user-list">
                        <h3>BAZA KONT</h3>
                        <ul id="users-ul">
                            </ul>
                    </div>
                </div>
            </div>

            <!-- OKNO APLIKACJI HAKERSKIEJ (GŁÓWNE) -->
            <div class="hacking-app" id="hacking-app" style="display: none;">
                
                <div class="app-header">
                    <h1>&gt; FIB:HACK_CHOICE</h1>
                    <div class="app-controls">
                        <span class="control-btn admin-btn-hide" id="open-admin-btn">ADM</span> <span class="control-btn min">-</span>
                        <span class="control-btn close">X</span>
                    </div>
                </div>

                <!-- GŁÓWNA STREFA GRY (Tu będą liczby) -->
                <div class="game-area" id="game-area">
                    <p class="matrix-text">&gt; SYSTEM GOTOWY.</p>
                    <p class="matrix-text">&gt; CZEKAM NA INICJALIZACJĘ...</p>
                </div>

                <!-- DOLNY PANEL INFORMACYJNY -->
                <div class="target-info">
                    <p>CEL: <span class="target-data">192.168.X.XXX / C4-D1_A9</span></p>
                    <div class="progress-bar-container">
                        <span class="timer-text" id="timer-text">00:45</span>
                        <div class="progress-bar-full">
                            <div class="progress-bar-current"></div>
                        </div>
                    </div>
                </div>
            </div>
 <!-- EFEKT SZKLANEGO EKRANU (ODBLASK I SCANLINES) -->
            <div class="screen-overlay"></div>
        </div>
    </div>

    <!-- Podpięcie logiki JavaScript -->
    <script src="script.js"></script>
</body>
</html>

</body>
</html>
